<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courier Sabana Norte</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
:root{
    --bg:#f5f7fa;
    --card:#ffffff;
    --card-alt:#eef2f6;
    --text:#111827;
    --muted:#6b7280;
    --border:#d1d5db;
    --primary:#2563eb;
    --success:#16a34a;
    --danger:#dc2626;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.header{
    margin-bottom:20px;
}

h1{
    font-size:2rem;
    margin-bottom:6px;
}

.subtitle{
    color:var(--muted);
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    padding:16px;
    margin-bottom:16px;
}

textarea{
    width:100%;
    min-height:180px;
    resize:vertical;
    padding:14px;
    border:1px solid var(--border);
    font-size:14px;
    font-family:Consolas, monospace;
    outline:none;
}

.actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
}

button{
    border:none;
    padding:14px 18px;
    cursor:pointer;
    font-weight:700;
    font-size:14px;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-secondary{
    background:#e5e7eb;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.stat{
    background:var(--card-alt);
    padding:16px;
    text-align:center;
}

.stat h2{
    margin-top:6px;
}

.progress{
    width:100%;
    height:20px;
    background:#e5e7eb;
    margin-top:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:var(--success);
    transition:.3s;
}

/* ── Mapa ── */
#mapCard{
    display:none;
    margin-bottom:16px;
}

#mapCard .map-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
}

#mapCard .map-header span{
    font-weight:700;
    font-size:15px;
}

#mapCard .map-header small{
    color:var(--muted);
    font-size:12px;
}

#map{
    width:100%;
    height:380px;
    border:1px solid var(--border);
}

.map-loading{
    text-align:center;
    color:var(--muted);
    padding:10px 0 4px;
    font-size:13px;
}

/* ── Leyenda del mapa ── */
.map-legend{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-top:10px;
    font-size:13px;
    color:var(--muted);
}

.map-legend span{
    display:flex;
    align-items:center;
    gap:6px;
}

.legend-dot{
    width:14px;
    height:14px;
    border-radius:50%;
    display:inline-block;
    flex-shrink:0;
}

.group{
    margin-top:25px;
}

.group-title{
    background:#dde7ff;
    border-left:6px solid var(--primary);
    padding:12px;
    font-weight:700;
    margin-bottom:10px;
}

.stop{
    display:flex;
    align-items:center;
    gap:14px;
    background:white;
    border:1px solid var(--border);
    padding:12px;
    margin-bottom:8px;
    transition:.2s;
}

.stop.done{
    opacity:.55;
}

.stop.next{
    border-left:10px solid var(--primary);
    background:#dbeafe;
}

.stop-info{
    flex:1;
}

.stop-address{
    font-weight:700;
    color:var(--primary);
    text-decoration:none;
    display:block;
}

.stop-address:hover{
    text-decoration:underline;
}

.stop-meta{
    color:var(--muted);
    font-size:13px;
    margin-top:4px;
}

.stop-number{
    font-weight:800;
    font-size:18px;
    min-width:60px;
    text-align:right;
}

input[type="checkbox"]{
    width:52px;
    height:52px;
    cursor:pointer;
    flex-shrink:0;
}

.badge-next{
    display:inline-block;
    background:var(--primary);
    color:white;
    padding:4px 8px;
    font-size:11px;
    margin-bottom:6px;
    font-weight:700;
}

.empty{
    text-align:center;
    color:var(--muted);
    padding:30px;
}

/* ── Modal ── */
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:2000;
    align-items:center;
    justify-content:center;
}

.modal-overlay.active{
    display:flex;
}

.modal-box{
    background:white;
    border:1px solid var(--border);
    padding:28px 24px 20px;
    max-width:360px;
    width:90%;
    text-align:center;
}

.modal-box p{
    font-size:15px;
    margin-bottom:20px;
    line-height:1.5;
}

.modal-btns{
    display:flex;
    gap:10px;
    justify-content:center;
}

.modal-btns button{
    min-width:100px;
}

@media(max-width:700px){

    .actions{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    .stop{
        align-items:flex-start;
    }

    .stop-number{
        min-width:auto;
    }

    #map{
        height:260px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🚚 Courier Sabana Norte</h1>
        <div class="subtitle">
            Pegue aquí la salida del GEM
        </div>
    </div>

    <div class="card">

        <textarea id="input"
placeholder="Cra 9 #15-20|Chía|Centro
Calle 12 #8-30|Chía|Río Frío
Carrera 4 #22-11|Cajicá|Capellanía"></textarea>

        <div class="actions">

            <button class="btn-primary" onclick="loadRoute()">
                Cargar Ruta
            </button>

            <button class="btn-secondary" onclick="copyNext()">
                📋 Copiar Dirección Siguiente
            </button>

            <button class="btn-secondary" onclick="askClearChecks()">
                Limpiar Ruta
            </button>

            <button class="btn-danger" onclick="askNewRoute()">
                Nueva Ruta
            </button>

        </div>

    </div>

    <div class="card">

        <div class="stats">

            <div class="stat">
                <div>Total</div>
                <h2 id="total">0</h2>
            </div>

            <div class="stat">
                <div>Entregadas</div>
                <h2 id="done">0</h2>
            </div>

            <div class="stat">
                <div>Pendientes</div>
                <h2 id="pending">0</h2>
            </div>

            <div class="stat">
                <div>Progreso</div>
                <h2 id="percent">0%</h2>
            </div>

        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

    </div>

    <!-- Mapa Leaflet -->
    <div class="card" id="mapCard">
        <div class="map-header">
            <span>🗺️ Mapa de paradas</span>
            <small id="mapStatus">Ubicando direcciones…</small>
        </div>
        <div id="map"></div>
        <div class="map-legend">
            <span><span class="legend-dot" style="background:#2563eb;"></span> Siguiente parada</span>
            <span><span class="legend-dot" style="background:#f97316;"></span> Pendiente</span>
            <span><span class="legend-dot" style="background:#9ca3af;"></span> Entregada</span>
        </div>
    </div>

    <div id="routes"></div>

</div>

<!-- Modal de confirmación -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <p id="modalMsg"></p>
        <div class="modal-btns">
            <button class="btn-primary" id="modalOk">Confirmar</button>
            <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>

const STORAGE_KEY = "courier_sabana_v2";

/* ── Storage ── */

function save(data){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getData(){
    try{
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }catch(e){
        return [];
    }
}

/* ── Modal ── */

function openModal(msg, onConfirm){
    document.getElementById("modalMsg").textContent = msg;
    document.getElementById("modalOk").onclick = function(){
        closeModal();
        onConfirm();
    };
    document.getElementById("modalOverlay").classList.add("active");
}

function closeModal(){
    document.getElementById("modalOverlay").classList.remove("active");
}

document.getElementById("modalOverlay").addEventListener("click", function(e){
    if(e.target === this) closeModal();
});

/* ── Mapa ── */

let leafletMap = null;
let mapMarkers = [];

function initMap(){
    if(leafletMap) return;
    leafletMap = L.map("map").setView([4.86, -74.03], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
        attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom:19
    }).addTo(leafletMap);
}

function makeIcon(number, color){
    const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
      <path d="M16 0C7.16 0 0 7.16 0 16c0 11 16 26 16 26S32 27 32 16C32 7.16 24.84 0 16 0z" fill="${color}"/>
      <circle cx="16" cy="16" r="10" fill="white"/>
      <text x="16" y="21" text-anchor="middle" font-size="11" font-weight="bold" fill="${color}" font-family="Arial,sans-serif">${number}</text>
    </svg>`;
    return L.divIcon({
        html: svg,
        className:"",
        iconSize:[32,42],
        iconAnchor:[16,42],
        popupAnchor:[0,-42]
    });
}

async function geocode(address, city){
    const q = encodeURIComponent(address + ", " + city + ", Colombia");
    const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + q;
    try{
        const r = await fetch(url, {headers:{"Accept-Language":"es"}});
        const json = await r.json();
        if(json && json.length > 0){
            return { lat: parseFloat(json[0].lat), lng: parseFloat(json[0].lon) };
        }
    }catch(e){}
    return null;
}

async function renderMap(data){

    const mapCard = document.getElementById("mapCard");
    const mapStatus = document.getElementById("mapStatus");

    if(data.length === 0){
        mapCard.style.display = "none";
        return;
    }

    mapCard.style.display = "block";
    initMap();

    // Limpiar marcadores anteriores
    mapMarkers.forEach(m => leafletMap.removeLayer(m));
    mapMarkers = [];

    const nextIndex = data.findIndex(x => !x.done);
    let geocoded = 0;
    const bounds = [];

    mapStatus.textContent = "Ubicando direcciones…";

    for(let i = 0; i < data.length; i++){

        const item = data[i];
        const coords = await geocode(item.address, item.city);

        // Pequeña pausa para respetar límite de Nominatim
        await new Promise(res => setTimeout(res, 300));

        if(!coords) continue;

        let color = "#f97316"; // pendiente
        if(item.done) color = "#9ca3af";
        if(i === nextIndex) color = "#2563eb";

        const icon = makeIcon(item.id, color);
        const marker = L.marker([coords.lat, coords.lng], {icon});

        const gmUrl = "https://www.google.com/maps/search/?api=1&query=" +
            encodeURIComponent(item.address + " " + item.city);

        marker.bindPopup(
            `<b>#${item.id} ${item.address}</b><br>
             ${item.city} · ${item.sector}<br>
             ${item.done ? "✅ Entregada" : (i === nextIndex ? "🔵 Siguiente parada" : "⏳ Pendiente")}<br>
             <a href="${gmUrl}" target="_blank" style="color:#2563eb;">Abrir en Google Maps</a>`
        );

        marker.addTo(leafletMap);
        mapMarkers.push(marker);
        bounds.push([coords.lat, coords.lng]);
        geocoded++;

        mapStatus.textContent = `Ubicando… ${geocoded} de ${data.length}`;
    }

    if(bounds.length > 0){
        leafletMap.fitBounds(bounds, {padding:[30,30]});
    }

    mapStatus.textContent = geocoded + " de " + data.length + " paradas ubicadas";

    // Forzar redibujado por si el mapa estaba oculto al inicializar
    setTimeout(()=>{ leafletMap.invalidateSize(); }, 100);
}

/* ── Acciones principales ── */

function loadRoute(){

    const text = document.getElementById("input").value.trim();

    if(!text){
        openModal("Pegue una ruta primero.", function(){});
        return;
    }

    const lines = text.split("\n").filter(x=>x.trim());

    const data = lines.map((line,index)=>{
        const parts = line.split("|");
        return{
            id:index+1,
            address:(parts[0]||"").trim(),
            city:(parts[1]||"General").trim(),
            sector:(parts[2]||"General").trim(),
            done:false
        };
    });

    save(data);
    render();
}

function askClearChecks(){
    openModal("¿Desmarcar todas las entregas?", clearChecks);
}

function clearChecks(){
    const data = getData();
    data.forEach(item=>{ item.done=false; });
    save(data);
    render();
}

function askNewRoute(){
    openModal("¿Eliminar la ruta actual y empezar de cero?", newRoute);
}

function newRoute(){
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById("input").value="";
    render();
}

/* ── Render lista ── */

function render(){

    const data = getData();
    const routes = document.getElementById("routes");
    routes.innerHTML="";

    if(data.length===0){
        routes.innerHTML='<div class="card empty">No hay ruta cargada.</div>';
        updateStats([]);
        renderMap([]);
        return;
    }

    const nextIndex = data.findIndex(x=>!x.done);
    const groups = {};

    data.forEach((item,index)=>{
        const key = item.city + " • " + item.sector;
        if(!groups[key]) groups[key]=[];
        groups[key].push({...item, index});
    });

    Object.keys(groups).forEach(group=>{

        const wrapper = document.createElement("div");
        wrapper.className="group";
        wrapper.innerHTML=`<div class="group-title">${group}</div>`;

        groups[group].forEach(item=>{

            const encoded = encodeURIComponent(item.address + " " + item.city);
            const row = document.createElement("div");
            row.className="stop";
            if(item.done) row.classList.add("done");
            if(item.index===nextIndex) row.classList.add("next");

            row.innerHTML=`
                <input
                    type="checkbox"
                    ${item.done ? "checked" : ""}
                    onchange="toggleDone(${item.index})">

                <div
                    class="stop-info"
                    onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encoded}','_blank')"
                    style="cursor:pointer;">

                    ${item.index===nextIndex ? '<div class="badge-next">SIGUIENTE PARADA</div>' : ''}

                    <a
                        class="stop-address"
                        href="https://www.google.com/maps/search/?api=1&query=${encoded}"
                        target="_blank">
                        ${item.address}
                    </a>

                    <div class="stop-meta">
                        ${item.city} · ${item.sector}
                    </div>

                </div>

                <div class="stop-number">
                    #${item.id}
                </div>
            `;

            wrapper.appendChild(row);
        });

        routes.appendChild(wrapper);
    });

    updateStats(data);
    renderMap(data);
}

function toggleDone(index){
    const data = getData();
    data[index].done = !data[index].done;
    save(data);
    render();
}

function updateStats(data){

    if(!data) data = getData();

    const total   = data.length;
    const done    = data.filter(x=>x.done).length;
    const pending = total - done;
    const percent = total ? Math.round(done*100/total) : 0;

    document.getElementById("total").textContent   = total;
    document.getElementById("done").textContent    = done;
    document.getElementById("pending").textContent = pending;
    document.getElementById("percent").textContent = percent+"%";
    document.getElementById("progressBar").style.width = percent+"%";
}

function copyNext(){

    const data = getData();
    const next = data.find(x=>!x.done);

    if(!next){
        openModal("No hay entregas pendientes.", function(){});
        return;
    }

    const texto = next.address + " " + next.city;

    navigator.clipboard.writeText(texto).then(function(){
        openModal("Dirección copiada:\n\n" + texto, function(){});
    }).catch(function(){
        openModal("No se pudo copiar. Dirección: " + texto, function(){});
    });
}

window.onload = render;

</script>

</body>
</html>
